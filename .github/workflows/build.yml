name: Build

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-tui-app
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm install

      - name: Build
        run: npm run tauri build -- --bundles deb,rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            my-tui-app/src-tauri/target/release/bundle/deb/*.deb
            my-tui-app/src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: my-tui-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm install

      - name: Build
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            my-tui-app/src-tauri/target/release/bundle/msi/*.msi
            my-tui-app/src-tauri/target/release/bundle/nsis/*.exe
