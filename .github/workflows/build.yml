name: Build Pokedex

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.platform.os }}

    permissions:
      contents: write

    steps:
      # 1. check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: my-tui-app/package-lock.json

      # 3. install Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. cache Rust dependencies
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "my-tui-app/src-tauri -> target"

      # 5. Linux only — install system dependencies
      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # 6. install npm dependencies
      - name: Install dependencies
        working-directory: my-tui-app
        run: npm install

      # 7. build the Tauri app
      # on push → just builds, no release created
      # on release → builds and attaches to GitHub release
      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: my-tui-app
          tagName: ${{ github.event_name == 'release' && 'v__VERSION__' || '' }}
          releaseName: ${{ github.event_name == 'release' && 'Pokedex v__VERSION__' || '' }}
          releaseBody: "See the release assets to download this version."
          releaseDraft: ${{ github.event_name == 'release' }}
          prerelease: false

      # 8. upload build artifacts to Actions tab (always)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-${{ matrix.platform.name }}
          path: |
            my-tui-app/src-tauri/target/release/bundle/deb/*.deb
            my-tui-app/src-tauri/target/release/bundle/appimage/*.AppImage
            my-tui-app/src-tauri/target/release/bundle/msi/*.msi
            my-tui-app/src-tauri/target/release/bundle/nsis/*.exe
            my-tui-app/src-tauri/target/release/bundle/dmg/*.dmg
            my-tui-app/src-tauri/target/release/bundle/macos/*.app
