name: Build Pokedex

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]  # also builds when you create a GitHub release

jobs:
  build:
    strategy:
      fail-fast: false  # don't cancel other builds if one fails
      matrix:
        platform:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.platform.os }}

    steps:
      # 1. check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # 3. install Rust — Tauri needs it
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 4. cache Rust dependencies — speeds up builds significantly
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # 5. Linux only — install system dependencies Tauri needs
      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # 6. install npm dependencies
      - name: Install dependencies
        run: npm install

      # 7. build the Tauri app
      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__    # uses version from tauri.conf.json
          releaseName: "Pokedex v__VERSION__"
          releaseBody: "See the release assets to download this version."
          releaseDraft: true       # creates a draft release, you publish manually
          prerelease: false

      # 8. upload build artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-${{ matrix.platform.name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
