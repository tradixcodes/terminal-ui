<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TUI App</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="terminal">
        <div id="titlebar">
          <span class="titlebar-title">~/tui-app</span>
          <div class="titlebar-dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
        </div>

        <div id="output-area"></div>

        <div id="input-line">
          <span class="prompt">user@tui-app <span class="prompt-path">~</span> $&nbsp;</span>
          <input
            id="cmd-input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            autofocus
          />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
